<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OBSCURA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

/* GRAIN */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.08;
  pointer-events: none;
}

/* NAV */
header {
  position: fixed;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  z-index: 100;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at center, #111 0%, #000 80%);
  text-align: center;
}

.hero h1 {
  font-size: 60px;
  letter-spacing: 6px;
  animation: glitch 2s infinite;
}

@keyframes glitch {
  0% { text-shadow: 2px 2px red; }
  50% { text-shadow: -2px -2px purple; }
  100% { text-shadow: 2px 2px red; }
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  background: black;
  border: 1px solid white;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: white;
  color: black;
}

/* SECTION */
.section {
  padding: 100px 40px;
  text-align: center;
}

/* PRODUCTS (SUBTLE HOVER) */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
}

.product {
  background: #0a0a0a;
  padding: 20px;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.product:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.product img {
  width: 100%;
  transition: transform 0.3s ease;
}

.product:hover img {
  transform: scale(1.03);
}

/* EYE */
.eye {
  position: fixed;
  width: 40px;
  height: 20px;
  background: white;
  border-radius: 50%;
  overflow: hidden;
  opacity: 0.2;
}

.pupil {
  width: 10px;
  height: 10px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 5px;
  left: 15px;
  transition: transform 0.2s ease-out;
}

/* BLINK */
.eye.blink {
  height: 2px !important;
}

/* POSITIONS */
.eye1 { top: 20%; left: 5%; }
.eye2 { top: 60%; right: 5%; }
.eye3 { bottom: 10%; left: 20%; }

footer {
  padding: 40px;
  background: black;
}
</style>
</head>

<body>

<header>
  <h2>OBSCURA</h2>
</header>

<div class="hero">
  <div>
    <h1>OBSCURA</h1>
    <button onclick="scrollDown()">ENTER</button>
  </div>
</div>

<div class="section">
  <h2>COLLECTION</h2>

  <div class="products">
    <div class="product">
      <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
      <h3>VOID HOODIE</h3>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <h3>SHADOW TEE</h3>
    </div>
  </div>
</div>

<!-- EYES -->
<div class="eye eye1"><div class="pupil"></div></div>
<div class="eye eye2"><div class="pupil"></div></div>
<div class="eye eye3"><div class="pupil"></div></div>

<footer>
  <p>© OBSCURA</p>
</footer>

<script>
function scrollDown() {
  window.scrollTo({ top: window.innerHeight, behavior: "smooth" });
}

/* TRACKING */
let lastMoveTime = Date.now();

document.addEventListener("mousemove", (e) => {
  lastMoveTime = Date.now();

  document.querySelectorAll(".eye").forEach(eye => {
    let pupil = eye.querySelector(".pupil");

    let rect = eye.getBoundingClientRect();
    let centerX = rect.left + rect.width / 2;
    let centerY = rect.top + rect.height / 2;

    let angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);

    let maxMove = 6;
    let moveX = Math.cos(angle) * maxMove;
    let moveY = Math.sin(angle) * maxMove;

    pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
  });
});

/* IDLE DRIFT */
setInterval(() => {
  if (Date.now() - lastMoveTime > 2000) {
    document.querySelectorAll(".eye").forEach(eye => {
      let pupil = eye.querySelector(".pupil");

      let randomX = (Math.random() - 0.5) * 8;
      let randomY = (Math.random() - 0.5) * 8;

      pupil.style.transform = `translate(${randomX}px, ${randomY}px)`;
    });
  }
}, 2000);

/* RANDOM BLINK */
function blinkEyes() {
  document.querySelectorAll(".eye").forEach(eye => {
    eye.classList.add("blink");

    setTimeout(() => {
      eye.classList.remove("blink");
    }, 150);
  });

  setTimeout(blinkEyes, 2000 + Math.random() * 3000);
}

blinkEyes();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOID Apparel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  background: #0a0a0a;
  color: white;
}

/* NAVBAR */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  z-index: 100;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  transition: 0.3s;
}

nav a:hover {
  color: #aaa;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url('https://images.unsplash.com/photo-1520975922323-4a2c66c2b1c7') center/cover;
  text-align: center;
}

.hero h2 {
  font-size: 50px;
  letter-spacing: 4px;
  animation: fadeIn 2s ease-in-out;
}

.hero button {
  margin-top: 20px;
  padding: 12px 30px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.hero button:hover {
  background: black;
  color: white;
  border: 1px solid white;
}

/* SECTIONS */
.section {
  padding: 100px 40px;
  text-align: center;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
  margin-top: 40px;
}

.product {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.product:hover {
  transform: scale(1.05);
}

/* Image hover zoom */
.product img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
}

.product:hover img {
  transform: scale(1.1);
}

/* Add to cart button */
.add-btn {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
  transition: 0.3s;
}

.add-btn:hover {
  background: black;
  color: white;
  border: 1px solid white;
}

/* CART */
.cart {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

footer {
  padding: 40px;
  text-align: center;
  background: #000;
}
</style>
</head>

<body>

<header>
  <h1>VOID</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <a href="#about">About</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>NEW DROP</h2>
    <button onclick="scrollToShop()">SHOP NOW</button>
  </div>
</section>

<section id="shop" class="section">
  <h2>Featured Pieces</h2>

  <div class="products">
    <div class="product">
      <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
      <h3>Black Hoodie</h3>
      <p>$60</p>
      <button class="add-btn" onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <h3>Oversized Tee</h3>
      <p>$35</p>
      <button class="add-btn" onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
      <h3>Cargo Pants</h3>
      <p>$80</p>
      <button class="add-btn" onclick="addToCart()">Add to Cart</button>
    </div>
  </div>
</section>

<section id="about" class="section">
  <h2>About</h2>
  <p>VOID is built on minimalism and modern streetwear culture.</p>
</section>

<div class="cart">
  🛒 Cart: <span id="cart-count">0</span>
</div>

<footer>
  <p>© 2026 VOID Apparel</p>
</footer>

<script>
let count = 0;

function addToCart() {
  count++;
  document.getElementById("cart-count").innerText = count;
}

function scrollToShop() {
  document.getElementById("shop").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VOID Apparel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
    }

    header h1 {
      font-size: 20px;
      letter-spacing: 2px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('https://images.unsplash.com/photo-1520975922323-4a2c66c2b1c7') center/cover;
      text-align: center;
    }

    .hero h2 {
      font-size: 48px;
      letter-spacing: 4px;
    }

    .hero button {
      margin-top: 20px;
      padding: 12px 30px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .section {
      padding: 100px 40px;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .product {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .product:hover {
      transform: scale(1.05);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .product h3 {
      margin: 10px 0;
    }

    footer {
      padding: 40px;
      text-align: center;
      background: #000;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>VOID</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>NEW DROP</h2>
    <button>SHOP NOW</button>
  </div>
</section>

<section class="section">
  <h2>Featured Pieces</h2>

  <div class="products">
    <div class="product">
      <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
      <h3>Black Hoodie</h3>
      <p>$60</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <h3>Oversized Tee</h3>
      <p>$35</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
      <h3>Cargo Pants</h3>
      <p>$80</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>About</h2>
  <p>VOID is built on minimalism, identity, and modern streetwear culture. Designed for those who move different.</p>
</section>

<footer>
  <p>© 2026 VOID Apparel</p>
</footer>

</body>
</html>
